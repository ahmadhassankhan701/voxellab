# Shopify CLI theme config
# Docs: https://shopify.dev/docs/storefronts/themes/tools/cli
#
# 1. Install CLI:  npm install -g @shopify/cli @shopify/theme
# 2. Login:        shopify auth login
# 3. Set store below, then run from this folder:
#      shopify theme dev          # live preview
#      shopify theme push         # upload theme
#      shopify theme pull         # download from store

[environments.development]
store = "REPLACE_WITH_YOUR_STORE.myshopify.com"

# Optional: pin to an existing theme ID after first push
# theme = "123456789012"
