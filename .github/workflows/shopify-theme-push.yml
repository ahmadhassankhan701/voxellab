# Push theme to Shopify on every push to main.
#
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   SHOPIFY_CLI_THEME_TOKEN  — Theme access token from Shopify Admin
#   SHOPIFY_STORE            — e.g. voxellab.myshopify.com
#
# Optional vars:
#   SHOPIFY_THEME_ID         — target theme ID (omit to create/update dev theme)

name: Deploy Shopify theme

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Push theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          if [ -n "${{ vars.SHOPIFY_THEME_ID }}" ]; then
            shopify theme push --theme "${{ vars.SHOPIFY_THEME_ID }}" --allow-live
          else
            shopify theme push --unpublished --allow-live
          fi
